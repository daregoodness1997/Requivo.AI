version: "3.9"

services:
  postgres:
    image: postgres:17
    container_name: requivo_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: requivo
      POSTGRES_PASSWORD: requivo_dev_pass
      POSTGRES_DB: requivo_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U requivo"]
      interval: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: requivo_redis
    restart: unless-stopped
    command: redis-server --save 60 1
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5

volumes:
  postgres_data:
  redis_data:
