version: "3.9"

services:
  # ─── Infrastructure ──────────────────────────────────────────────
  postgres:
    image: postgres:17
    container_name: requivo_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: requivo
      POSTGRES_PASSWORD: requivo_dev_pass
      POSTGRES_DB: requivo_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U requivo"]
      interval: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: requivo_redis
    restart: unless-stopped
    command: redis-server --save 60 1
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5

  # ─── Backend ─────────────────────────────────────────────────────
  api:
    image: daregoodness/requivo.ai:api
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: requivo_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__Postgres=Host=postgres;Port=5432;Database=requivo_db;Username=requivo;Password=requivo_dev_pass
      - ConnectionStrings__Redis=redis:6379
      - Cors__AllowedOrigins=${CORS_ALLOWED_ORIGINS:-http://localhost:80,http://localhost:5173}
      - Qwen__ApiKey=${QWEN_API_KEY:-}
      - SendGrid__ApiKey=${SENDGRID_API_KEY:-}
      - Slack__WebhookUrl=${SLACK_WEBHOOK_URL:-}
      - Erp__Procurement__ApiKey=${ERP_API_KEY:-}
      - Erp__Procurement__BearerToken=${ERP_BEARER_TOKEN:-}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      retries: 3
      start_period: 60s

  # ─── Frontend ────────────────────────────────────────────────────
  web:
    image: daregoodness/requivo.ai:web
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8080
        VITE_SSE_URL: http://localhost:8080/api/workflow/events
    container_name: requivo_web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80:80"

volumes:
  postgres_data:
  redis_data:
